<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電話分機 - 臺灣臺島地方檢察署</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-header { background-color: var(--primary-dark); color: white; padding: 40px 0; margin-bottom: 40px; }
        .page-header h1 { font-size: 2rem; }
        .directory-container { max-width: 900px; margin: 0 auto 60px; background: var(--bg-white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 40px; }
        .dir-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .dir-table th, .dir-table td { border: 1px solid var(--border-color); padding: 12px 15px; text-align: left; }
        .dir-table th { background-color: var(--bg-gray); font-weight: 600; color: var(--primary-dark); }
        .dir-table tr:hover { background-color: #f1f5f9; }
        .dept-title { font-size: 1.5rem; color: var(--primary-color); margin-top: 30px; margin-bottom: 15px; border-bottom: 2px solid var(--primary-light); display: inline-block; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="nav-container container">
            <a href="index.html" class="logo">
                <div class="logo-img-placeholder"><i class="fa-solid fa-scale-balanced"></i></div>
                <div class="logo-text"><h1>臺灣臺島地方檢察署</h1></div>
            </a>
            <nav class="main-nav">
                <ul class="nav-menu">
                    <li><a href="index.html">首頁</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="main-content">
        <div class="page-header">
            <div class="container">
                <h1>電話分機表</h1>
                <p>總機代表號：(02) 2345-6789</p>
            </div>
        </div>

        <div class="container">
            <div class="directory-container">
                <h2 class="dept-title">為民服務中心</h2>
                <table class="dir-table">
                    <tr><th>服務項目</th><th>分機號碼</th></tr>
                    <tr><td>收狀、發還保證金</td><td>101, 102</td></tr>
                    <tr><td>訴訟輔導、法律諮詢</td><td>110</td></tr>
                </table>

                <h2 class="dept-title">紀錄科</h2>
                <table class="dir-table">
                    <tr><th>股別</th><th>分機號碼</th></tr>
                    <tr><td>天股、地股</td><td>201</td></tr>
                    <tr><td>玄股、黃股</td><td>202</td></tr>
                    <tr><td>宇股、宙股</td><td>203</td></tr>
                </table>

                <h2 class="dept-title">執行科</h2>
                <table class="dir-table">
                    <tr><th>服務項目</th><th>分機號碼</th></tr>
                    <tr><td>罰金繳納查詢</td><td>301</td></tr>
                    <tr><td>社會勞動諮詢</td><td>305</td></tr>
                </table>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Taiwan Taidao District Prosecutors Office. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
